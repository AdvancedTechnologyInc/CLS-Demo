
name: Update Iteration Field

on:
  schedule:
    - cron: '30 20 * * 0'   # 매주 월요일 KST 05:00
  workflow_dispatch:

jobs:
  update-iteration-if-needed:
    runs-on: ubuntu-22.04 

    steps:
      - name: Check issue existence (fast query)
        id: get_issues
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          COUNT=$(gh api --method GET repos/${{ github.repository }}/issues \
            -f state=open \
            -f per_page=1 \
            --jq 'length')
          if [ -z "$COUNT" ] || [ "$COUNT" = "null" ]; then COUNT=0; fi
          echo "has_issues=$COUNT" >> $GITHUB_OUTPUT
      - name: Skip if no issues
        if: ${{ steps.get_issues.outputs.has_issues == '0' }}
        run: echo " No open issues → exit early."

      - name: Move to next iteration
        if: ${{ steps.get_issues.outputs.has_issues != '0' }}
        uses: blombard/move-to-next-iteration@master
        with:
          owner: "AdvancedTechnologyInc"
          number: 22
          token: ${{ secrets.TOKEN }}
          iteration-field: "week"
          iteration: current
          new-iteration: next
          excluded-statuses: "Done"