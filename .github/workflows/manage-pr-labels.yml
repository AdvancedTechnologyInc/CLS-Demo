name: Manage PR Labels

on:
  pull_request:
    types: opened

jobs:
  pr-actions:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - name: Extract and Sync Labels
        id: sync-labels
        run: |
          BODY="${{ github.event.pull_request.body }}"
          ISSUE_NUMS=$(echo "$BODY" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u)
          
          if [ -z "$ISSUE_NUMS" ]; then
            echo "No issue references found."
            exit 0
          fi

          ALL_LABELS=()
          for NUM in $ISSUE_NUMS; do
            # 연결된 이슈에서 라벨 추출
            LABELS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$NUM" | jq -r '.labels[].name')
            
            if [ "$LABELS" != "null" ] && [ -n "$LABELS" ]; then
              while read -r line; do 
                if [ -n "$line" ]; then ALL_LABELS+=("$line"); fi
              done <<< "$LABELS"
            fi
          done

          # 중복 제거 및 JSON 배열화
          UNIQUE_LABELS=$(printf '%s\n' "${ALL_LABELS[@]}" | sort -u | jq -R . | jq -s -c .)

          if [ "$UNIQUE_LABELS" == "[]" ] || [ -z "$UNIQUE_LABELS" ]; then
            echo "No labels found to apply."
            exit 0
          fi

          # PR에 한 번에 적용
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"labels\":$UNIQUE_LABELS}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels"